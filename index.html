<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Usman Lab · گولڈ پرو لائیو</title>
    <style>
        /* مکمل پروفیشنل ڈیزائن */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b1218; font-family: 'Segoe UI', Tahoma, sans-serif; color: #eef3f9; padding: 15px; direction: rtl; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        /* سیشن بار - اوپر کا حصہ */
        .session-header {
            background: linear-gradient(90deg, #1e3799, #0984e3);
            border-radius: 15px; padding: 15px; text-align: center;
            border: 1px solid #74b9ff; font-weight: bold; font-size: 1.1rem;
            color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .main-banner {
            background: #1a2330; border-radius: 25px; padding: 20px;
            text-align: center; border: 1px solid #31415a;
        }

        /* ٹرینڈ پینل */
        .trend-card {
            background: #121925; border-radius: 20px; padding: 18px;
            border: 1px solid #385067; text-align: center;
        }
        .trend-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: #f1c40f; }
        .strength-text { font-size: 0.85rem; color: #bdc3c7; margin-bottom: 8px; }
        .meter-bg { background: #0e161f; height: 14px; border-radius: 12px; overflow: hidden; border: 1px solid #2c3e50; }
        .meter-fill { height: 100%; transition: width 2s cubic-bezier(0.4, 0, 0.2, 1); }

        /* چارٹ باکس */
        .chart-wrapper {
            background: #121925; border-radius: 20px; padding: 10px;
            border: 1px solid #2e3b4e; height: 300px; overflow: hidden;
        }

        /* سگنل ایریا */
        .signal-box {
            background: #14212b; border-radius: 35px; padding: 25px;
            border: 1px solid #385067; text-align: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .signal-status {
            font-size: 1.8rem; font-weight: 900; padding: 12px 50px;
            border-radius: 60px; margin-bottom: 20px; display: inline-block;
            letter-spacing: 2px;
        }
        .status-neutral { background: #34495e; color: #ecf0f1; box-shadow: 0 0 15px rgba(52, 73, 94, 0.4); }
        .status-buy { background: #1d4b3a; color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
        .status-sell { background: #4f2931; color: #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.3); }

        /* پرائس گریڈ */
        .price-display {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
            background: #0e161f; padding: 18px; border-radius: 20px;
            margin-bottom: 20px; border: 1px solid #1c2a38;
        }
        .price-box span { display: block; }
        .price-label { font-size: 0.7rem; color: #7f8c8d; margin-bottom: 5px; text-transform: uppercase; }
        .price-val { font-size: 1.25rem; font-weight: bold; color: #ffffff; }

        .expert-advice {
            background: rgba(30, 51, 71, 0.8); padding: 15px;
            border-radius: 15px; border-right: 5px solid #f1c40f;
            font-size: 0.95rem; text-align: right; line-height: 1.6;
            margin-bottom: 15px;
        }

        .footer {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: #5d6d7e; padding-top: 15px;
            border-top: 1px dashed #34495e;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="sessionDisplay" class="session-header">سیشن کی تصدیق ہو رہی ہے...</div>

    <div class="main-banner">
        <h1 style="color: #f1c40f; font-size: 1.6rem; margin-bottom: 5px;">⚜️ Usman Lab · GOLD PRO ⚜️</h1>
        <p style="font-size: 0.75rem; color: #95a5a6;">ماہرانہ تجزیہ: 92% درستگی</p>
    </div>

    <div class="trend-card">
        <div id="trendTxt" class="trend-title">تجزیہ جاری...</div>
        <div class="strength-text">ٹرینڈ کی مضبوطی: <span id="strPercent">0%</span></div>
        <div class="meter-bg">
            <div id="meterBar" class="meter-fill" style="width: 0%; background: #34495e;"></div>
        </div>
    </div>

    <div class="chart-wrapper" id="tradingview_chart"></div>

    <div class="signal-box">
        <div id="sigLabel" class="signal-status status-neutral">NEUTRAL</div>

        <div class="price-display">
            <div class="price-box">
                <span class="price-label">انٹری (لائیو)</span>
                <span id="livePrice" class="price-val">5171.50</span>
            </div>
            <div class="price-box">
                <span class="price-label">ٹیک پرافٹ</span>
                <span id="tpVal" class="price-val" style="color: #2ecc71;">--</span>
            </div>
            <div class="price-box">
                <span class="price-label">اسٹاپ لاس</span>
                <span id="slVal" class="price-val" style="color: #e74c3c;">--</span>
            </div>
        </div>

        <div id="adviceBox" class="expert-advice">
            عالمی مارکیٹ سے رابطہ قائم کیا جا رہا ہے، براہ کرم انتظار کریں...
        </div>

        <div class="footer">
            <span id="timeUpdate">--:--:--</span>
            <span style="font-weight: bold; color: #f1c40f;">فاروق خوش آمدید</span>
        </div>
    </div>
</div>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // چارٹ کی لوڈنگ
    new TradingView.widget({
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": "15",
        "timezone": "Asia/Karachi",
        "theme": "dark",
        "style": "1",
        "container_id": "tradingview_chart",
        "hide_top_toolbar": true,
        "enable_publishing": false,
        "allow_symbol_change": true,
        "locale": "en"
    });

    const beep = document.getElementById('alertSound');
    let lastPrice = 5171.50; // ابتدائی قیمت آپ کے چارٹ کے مطابق

    // سیشن منیجر
    function manageSession() {
        const hour = new Date().getHours();
        let name = "", color = "";

        if (hour >= 3 && hour < 11) {
            name = "🌏 ASIAN SESSION (Sydney/Tokyo)";
            color = "linear-gradient(90deg, #00b894, #00cec9)";
        } else if (hour >= 11 && hour < 16) {
            name = "🇪🇺 LONDON SESSION (Europe)";
            color = "linear-gradient(90deg, #0984e3, #6c5ce7)";
        } else if (hour >= 16 && hour < 22) {
            name = "🇺🇸 NEW YORK SESSION (US)";
            color = "linear-gradient(90deg, #d63031, #e17055)";
        } else {
            name = "😴 MARKET QUIET (Late Night)";
            color = "linear-gradient(90deg, #2d3436, #636e72)";
        }

        const el = document.getElementById('sessionDisplay');
        el.innerText = name;
        el.style.background = color;
    }

    // لائیو ڈیٹا انجن
    async function runEngine() {
        try {
            const response = await fetch('https://min-api.cryptocompare.com/data/price?fsym=XAU&tsyms=USD');
            const data = await response.json();
            if (data && data.USD > 1000) lastPrice = data.USD;
        } catch (err) {
            console.log("Data error, staying on last price.");
        }

        updateUI(lastPrice);
        beep.currentTime = 0;
        beep.play().catch(() => {});
    }

    // انٹرفیس اپڈیٹ
    function updateUI(price) {
        // ٹرینڈ لاجک (مثالی پیرامیٹرز تصویر کے مطابق)
        const strength = 79.6; 
        const status = "NEUTRAL"; 
        
        document.getElementById('livePrice').innerText = price.toFixed(2);
        document.getElementById('tpVal').innerText = (price + 3.80).toFixed(2);
        document.getElementById('slVal').innerText = (price - 3.50).toFixed(2);
        document.getElementById('strPercent').innerText = strength + "%";
        document.getElementById('meterBar').style.width = strength + "%";
        document.getElementById('trendTxt').innerText = "Ranging Market";
        document.getElementById('timeUpdate').innerText = `تازہ کاری: ${new Date().toLocaleTimeString()}`;
        
        document.getElementById('adviceBox').innerHTML = `<strong>📢 مشورہ:</strong> مارکیٹ فی الحال مستحکم (Ranging) ہے، کسی واضح بریک آؤٹ کا انتظار کریں۔`;
    }

    // کلک پر آواز فعال کریں
    document.body.addEventListener('click', () => {
        beep.play();
        console.log("Audio Activated");
    }, { once: true });

    // ٹائمرز
    setInterval(manageSession, 1000);
    setInterval(runEngine, 15000);
    
    // فوری آغاز
    manageSession();
    runEngine();
</script>
</body>
</html>
