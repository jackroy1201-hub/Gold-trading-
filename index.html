<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Roman System • Mobile Gold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
    }
    
    /* موبائل پر چارٹ کا سائز (زوم کی ضرورت نہیں) */
    #tvchart { flex-grow: 1; width: 100%; height: 75vh; }

    /* نیچے کا پینل جو موبائل سکرین پر فٹ آئے گا */
    .mobile-panel { 
      background: #0a0a0a; height: 25vh; padding: 10px; 
      display: flex; flex-direction: column; justify-content: space-around;
      border-top: 3px solid #f1c40f; box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
    }

    .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .price-now { font-size: 1.8rem; font-weight: 900; color: #fff; }
    .timer { font-size: 0.9rem; color: #f1c40f; font-weight: bold; background: #1a1a1a; padding: 2px 8px; border-radius: 4px; }

    /* سگنل کا خانہ - بڑا اور واضح */
    .sig-display-box { 
      background: rgba(255,255,255,0.03); width: 100%; height: 60px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px; border: 1px solid #333; margin: 5px 0;
    }
    .sig-text { font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
    .buy { color: #2ecc71; text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
    .sell { color: #e74c3c; text-shadow: 0 0 15px rgba(231, 76, 60, 0.4); }
    .wait { color: #444; }

    .target-row { display: flex; justify-content: space-between; gap: 10px; width: 100%; }
    .target-box { 
      flex: 1; background: #111; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #222;
    }
    .t-label { font-size: 0.6rem; color: #666; font-weight: bold; margin-bottom: 2px; }
    .t-val { font-size: 1rem; font-weight: bold; }

    .bottom-info { display: flex; justify-content: space-between; font-size: 0.65rem; color: #555; padding-top: 5px; }
  </style>
</head>
<body onclick="initAudio()">

  <div id="tvchart"></div>

  <div class="mobile-panel">
    <div class="top-row">
        <div>
            <div style="font-size: 0.6rem; color: #888;">XAUUSD LIVE</div>
            <div class="price-now" id="curPrice">0.00</div>
        </div>
        <div class="timer" id="cdTimer">00:00</div>
    </div>

    <div class="sig-display-box">
        <div id="sigDisplay" class="sig-text wait">SCANNING</div>
    </div>

    <div class="target-row">
        <div class="target-box">
            <div class="t-label">TAKE PROFIT</div>
            <div class="t-val" id="tpVal" style="color:#2ecc71;">--</div>
        </div>
        <div class="target-box">
            <div class="t-label">STOP LOSS</div>
            <div class="t-val" id="slVal" style="color:#e74c3c;">--</div>
        </div>
        <div class="target-box">
            <div class="t-label">RSI (14)</div>
            <div class="t-val" id="mRSI" style="color:#f7e3b2;">--</div>
        </div>
    </div>

    <div class="bottom-info">
        <span>ROMAN SYSTEM v4.0</span>
        <span id="sigTime">SYNCED: --:--</span>
    </div>
  </div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  new TradingView.widget({
    "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15",
    "timezone": "Asia/Karachi", "theme": "dark", "style": "1",
    "container_id": "tvchart", "hide_top_toolbar": true, "save_image": false,
    "hide_legend": true, "withdateranges": false, "backgroundColor": "#000000"
  });

  let pHistory = JSON.parse(localStorage.getItem('pHistory')) || [];
  let aCtx = null;
  let hasLocked = false;

  // موبائل بیک گراؤنڈ سے واپسی پر ڈیٹا ریکوری
  window.onload = () => {
    const saved = JSON.parse(localStorage.getItem('romanLockedSignal'));
    if(saved) applyUI(saved.sig, saved.tp, saved.sl, saved.trend, saved.rsi, saved.time);
  };

  function initAudio() { if(!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function beep(f) { if(!aCtx) return; const o=aCtx.createOscillator(), g=aCtx.createGain(); o.connect(g); g.connect(aCtx.destination); o.frequency.value=f; g.gain.value=0.1; o.start(); o.stop(aCtx.currentTime+0.5); }

  async function fetchMarket() {
    try {
      const r = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT");
      const d = await r.json(); const p = parseFloat(d.price);
      document.getElementById("curPrice").innerText = p.toFixed(2);
      
      pHistory.push(p); if(pHistory.length > 100) pHistory.shift();
      localStorage.setItem('pHistory', JSON.stringify(pHistory));

      const now = new Date();
      const min = now.getMinutes(), sec = now.getSeconds();
      
      // 15 منٹ ٹائمر لاجک
      let nextMin = 15 - (min % 15);
      document.getElementById("cdTimer").innerText = `${nextMin-1}:${59-sec < 10 ? '0'+(59-sec) : 59-sec}`;

      // ہر 15 منٹ پر سگنل اپ ڈیٹ اور لاک
      if (min % 15 === 0 && sec < 2) {
        if (!hasLocked) { executeLogic(p); hasLocked = true; }
      } else { hasLocked = false; }
    } catch(e) {}
  }

  function executeLogic(p) {
    if(pHistory.length < 20) return;
    const rsi = calcRSI();
    const ma = pHistory.reduce((a,b)=>a+b)/pHistory.length;
    const trend = p > ma ? "BULLISH" : "BEARISH";
    const h = Math.max(...pHistory.slice(-30, -1)), l = Math.min(...pHistory.slice(-30, -1));
    
    let sig = (p <= l || rsi < 33) ? "BUY" : (p >= h || rsi > 67) ? "SELL" : (trend === "BULLISH" ? "BUY" : "SELL");
    let tp = (sig === "BUY" ? p + 2.8 : p - 2.8).toFixed(2);
    let sl = (sig === "BUY" ? p - 1.4 : p + 1.4).toFixed(2);
    let time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    // سگنل کو لوکل میموری میں محفوظ کرنا تاکہ بیک گراؤنڈ میں رہے
    const lockData = { sig, tp, sl, trend, rsi, time };
    localStorage.setItem('romanLockedSignal', JSON.stringify(lockData));

    applyUI(sig, tp, sl, trend, rsi, time);
    beep(sig === "BUY" ? 1000 : 500);
  }

  function applyUI(sig, tp, sl, trend, rsi, time) {
    const sEl = document.getElementById("sigDisplay");
    sEl.innerText = sig; sEl.className = "sig-text " + sig.toLowerCase();
    document.getElementById("tpVal").innerText = tp;
    document.getElementById("slVal").innerText = sl;
    document.getElementById("mRSI").innerText = parseFloat(rsi).toFixed(0);
    document.getElementById("sigTime").innerText = `LOCKED: ${time}`;
  }

  function calcRSI() {
    let u=0, d=0;
    for(let i=pHistory.length-14; i<pHistory.length; i++) {
      let diff = pHistory[i]-pHistory[i-1];
      diff>0 ? u+=diff : d-=diff;
    }
    return 100 - (100/(1+(u/(d||1))));
  }

  setInterval(fetchMarket, 1000);
</script>
</body>
</html>
