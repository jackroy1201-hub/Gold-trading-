<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Usman Lab • Roman System V8</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #tvchart { flex-grow: 1; width: 100%; height: 68vh; border-bottom: 2px solid #222; }
    .mobile-panel { background: #0a0a0a; height: 32vh; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border-top: 3px solid #f1c40f; }
    .top-row { display: flex; justify-content: space-between; align-items: center; }
    .price-now { font-size: 1.8rem; font-weight: 900; color: #fff; }
    .timer { font-size: 0.9rem; color: #f1c40f; font-weight: bold; background: #1a1a1a; padding: 3px 10px; border-radius: 5px; border: 1px solid #333; }
    .sig-container { background: rgba(255,255,255,0.03); width: 100%; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #333; margin: 5px 0; }
    .sig-text { font-size: 2.2rem; font-weight: 950; letter-spacing: 3px; text-transform: uppercase; }
    .reason-box { background: #1a1a1a; padding: 5px; border-radius: 5px; text-align: center; font-size: 0.72rem; color: #aaa; min-height: 25px; margin-bottom: 5px; border-left: 3px solid #f1c40f; line-height: 1.2; }
    .buy { color: #2ecc71; text-shadow: 0 0 20px rgba(46, 204, 113, 0.5); }
    .sell { color: #e74c3c; text-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }
    .wait { color: #f1c40f; font-size: 1.3rem; }
    .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .data-box { background: #111; padding: 6px 2px; border-radius: 8px; text-align: center; border: 1px solid #222; }
    .label { font-size: 0.55rem; color: #666; font-weight: bold; display: block; }
    .val { font-size: 0.75rem; font-weight: bold; }
    .footer-info { display: flex; justify-content: space-between; font-size: 0.7rem; color: #444; font-weight: bold; }
  </style>
</head>
<body onclick="initAudio()">

  <div id="tvchart"></div>

  <div class="mobile-panel">
    <div class="top-row">
        <div>
            <span style="font-size: 0.6rem; color: #888; display: block;">USMAN LAB • ROMAN SYSTEM V8</span>
            <div class="price-now" id="curPrice">0.00</div>
        </div>
        <div class="timer" id="cdTimer">00:00</div>
    </div>

    <div class="sig-container">
        <div id="sigDisplay" class="sig-text wait">STARTING...</div>
    </div>

    <div class="reason-box" id="sigReason">CANDLE ANALYSIS ACTIVE</div>

    <div class="data-grid">
        <div class="data-box"><span class="label">TREND</span><span class="val" id="mTrend">--</span></div>
        <div class="data-box"><span class="label">LEVEL</span><span class="val" id="mSR">--</span></div>
        <div class="data-box"><span class="label">MARKET</span><span class="val" id="mState">--</span></div>
        <div class="data-box"><span class="label">OB ZONE</span><span class="val" id="mOB">STABLE</span></div>
    </div>

    <div class="footer-info">
        <div style="color:#2ecc71">TP: <span id="tpVal">--</span></div>
        <div id="sigTime">SYNCED: --:--</div>
        <div style="color:#e74c3c">SL: <span id="slVal">--</span></div>
    </div>
  </div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  new TradingView.widget({
    "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15",
    "timezone": "Asia/Karachi", "theme": "dark", "style": "1",
    "container_id": "tvchart", "hide_top_toolbar": true, "hide_legend": true, "backgroundColor": "#000000"
  });

  let pHistory = JSON.parse(localStorage.getItem('pHistory')) || [];
  let lastSignalTime = null; 
  let aCtx = null;

  function initAudio() { if(!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playBeep(freq, duration) { 
    if(!aCtx) return; 
    const o=aCtx.createOscillator(), g=aCtx.createGain(); 
    o.connect(g); g.connect(aCtx.destination); 
    o.frequency.value=freq; g.gain.value=0.1; 
    o.start(); o.stop(aCtx.currentTime + duration); 
  }

  async function fetchMarket() {
    try {
      const r = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT");
      const d = await r.json(); const p = parseFloat(d.price);
      document.getElementById("curPrice").innerText = p.toFixed(2);
      pHistory.push(p); if(pHistory.length > 200) pHistory.shift();
      localStorage.setItem('pHistory', JSON.stringify(pHistory));

      const now = new Date();
      const min = now.getMinutes(), sec = now.getSeconds();
      
      // 15 منٹ کینڈل کا آغاز چیک کریں (00, 15, 30, 45 منٹ پر)
      let candleMinute = Math.floor(min / 15) * 15;
      let currentCandleKey = `${now.getHours()}:${candleMinute}`;

      // ٹائمر اپڈیٹ
      let remMin = 14 - (min % 15), remSec = 59 - sec;
      document.getElementById("cdTimer").innerText = `${remMin}:${remSec < 10 ? '0'+remSec : remSec}`;

      // کینڈل کے آخری 10 سیکنڈ میں لوڈنگ دکھائیں، لیکن پرانا سگنل غائب نہ کریں
      if (remMin === 0 && remSec <= 10) {
          document.getElementById("sigReason").innerText = "WAIT FEW TIME... ANALYZING NEXT CANDLE";
      }

      // اگر نئی کینڈل شروع ہوئی ہے تو نیا سگنل لاک کریں
      if (lastSignalTime !== currentCandleKey) {
          executeLogic(p);
          lastSignalTime = currentCandleKey;
      }
    } catch(e) {}
  }

  function executeLogic(p) {
    if(pHistory.length < 50) return;
    
    const lookback = pHistory.slice(-80);
    const high = Math.max(...lookback), low = Math.min(...lookback);
    const ma = pHistory.slice(-40).reduce((a,b)=>a+b)/40;
    
    let trend = p > ma ? "BULLISH" : "BEARISH";
    let obZone = (p >= high - 0.3) ? "SUPPLY (OB)" : (p <= low + 0.3) ? "DEMAND (OB)" : "STABLE";

    let sig = "WAIT", reason = "";

    // اب یہ ہر حال میں BUY یا SELL دے گا
    if (trend === "BULLISH") {
        sig = "BUY";
        if (obZone === "DEMAND (OB)") reason = "STRONG BUY: TREND BULLISH + DEMAND OB FOUND";
        else if (obZone === "SUPPLY (OB)") reason = "BUY: TREND BULLISH BUT NEAR SUPPLY (WATCH OUT)";
        else reason = "BUY: TREND CONTINUATION IN NEW CANDLE";
    } else {
        sig = "SELL";
        if (obZone === "SUPPLY (OB)") reason = "STRONG SELL: TREND BEARISH + SUPPLY OB FOUND";
        else if (obZone === "DEMAND (OB)") reason = "SELL: TREND BEARISH BUT NEAR DEMAND (WATCH OUT)";
        else reason = "SELL: TREND CONTINUATION IN NEW CANDLE";
    }

    applyUI(sig, reason, p, trend, obZone);
  }

  function applyUI(sig, reason, p, trend, obZone) {
    const sEl = document.getElementById("sigDisplay");
    sEl.innerText = sig;
    sEl.className = "sig-text " + sig.toLowerCase();
    document.getElementById("sigReason").innerText = reason;
    
    let tp = (sig === "BUY" ? p + 2.8 : p - 2.8).toFixed(2);
    let sl = (sig === "BUY" ? p - 1.4 : p + 1.4).toFixed(2);
    
    document.getElementById("tpVal").innerText = tp;
    document.getElementById("slVal").innerText = sl;
    document.getElementById("mTrend").innerText = trend;
    document.getElementById("mOB").innerText = obZone;
    document.getElementById("mState").innerText = "TRENDING";
    document.getElementById("sigTime").innerText = `LOCKED: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    
    document.getElementById("mOB").style.color = (obZone.includes("SUPPLY")) ? "#e74c3c" : (obZone.includes("DEMAND")) ? "#2ecc71" : "#fff";
    document.getElementById("mTrend").style.color = (trend === "BULLISH") ? "#2ecc71" : "#e74c3c";

    if(sig === "BUY") playBeep(1200, 0.5);
    if(sig === "SELL") playBeep(600, 0.5);
  }

  setInterval(fetchMarket, 1000);
</script>
</body>
</html>
